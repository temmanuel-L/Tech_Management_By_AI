services:
  # ---- PostgreSQL 数据库 ----
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: techmgmt
      POSTGRES_PASSWORD: techmgmt123
      POSTGRES_DB: tech_mgmt_ai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techmgmt"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- FastAPI 后端 ----
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://techmgmt:techmgmt123@postgres:5432/tech_mgmt_ai
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    develop:
      watch:
        - path: tech_mgmt_ai
          action: sync+restart
          target: /app/tech_mgmt_ai
        - path: pyproject.toml
          action: rebuild
        - path: uv.lock
          action: rebuild
        - path: docker
          action: rebuild

  # ---- Vue 前端 (nginx) ----
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    develop:
      watch:
        - path: frontend
          action: rebuild
        - path: docker
          action: rebuild

volumes:
  pgdata:
